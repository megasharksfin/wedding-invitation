<div class="page-container">
  <div class="main-container">
    <button class="home fade-in" type="button" (click)="navigate()">
      <img src="https://res.cloudinary.com/dlk5shsgs/image/upload/v1774875649/home_lqdqps.svg" alt="home" />
    </button>

    <img class="celine-gelo" src="https://res.cloudinary.com/dlk5shsgs/image/upload/v1774874860/Group_5_ok3eol.png" alt="Celine Gelo" />
    
    <span class="fade-in title">Frequently Asked Questions</span>
    <div class="fade-in accordion" ngbAccordion>
      @for (item of accordionList; track item.question) {
        <div ngbAccordionItem>
          <h3 ngbAccordionHeader>
            <button type="button" ngbAccordionButton>
              {{ item.question }}
            </button>
          </h3>
          <div ngbAccordionCollapse>
            <div ngbAccordionBody class="answer">
              <ng-template>{{ item.answer }}</ng-template>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</div>
